<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>netvideo</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
  :root{
    --bg:#0b0b0b; --card:#111; --muted:#bfbfbf; --accent:#e50914;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter,Segoe UI,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(ellipse at top left, rgba(229,9,20,0.06), transparent 20%),
      linear-gradient(180deg,#000 0%, #050505 100%);
    color:#fff;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* Header */
  header{
    height:72px; display:flex; align-items:center; justify-content:space-between;
    padding:0 28px; position:fixed; left:0; right:0; top:0; z-index:40;
    background:linear-gradient(180deg,rgba(0,0,0,.7),transparent 40%);
    gap:12px;
  }
  .logo{font-weight:900;color:var(--accent);font-size:26px;letter-spacing:2px}
  .controls{display:flex;gap:12px;align-items:center}
  .btn{
    background:var(--accent); border:none; padding:9px 14px; border-radius:8px; color:#fff; cursor:pointer; font-weight:700;
    box-shadow:0 6px 18px rgba(229,9,20,.08);
  }
  .btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.06);color:#fff}

  /* Hero */
  .hero{
    height:56vh; padding:120px 48px 40px; display:flex; align-items:flex-end;
    background-image:
      linear-gradient(180deg,rgba(0,0,0,0.25) 20%, rgba(0,0,0,0.85)),
      url('https://images.unsplash.com/photo-1517604931442-7c5f1bd0a3e6?q=80&w=1770&auto=format&fit=crop&ixlib=rb-4.0.3&s=');
    background-size:cover; background-position:center;
    position:relative; overflow:hidden;
  }
  .hero .meta{max-width:720px}
  .hero h1{font-size:48px;margin:0 0 8px;line-height:1}
  .hero p{color:rgba(255,255,255,.9);margin:0 0 16px}
  .hero .cta{display:flex;gap:12px;align-items:center}

  /* Small hero play overlay */
  .hero .play-mini{display:inline-flex;gap:10px;align-items:center;padding:10px 12px;border-radius:8px;background:rgba(0,0,0,.4);cursor:pointer;border:1px solid rgba(255,255,255,.05)}
  .play-icon{width:18px;height:18px;border-left:12px solid #fff;border-top:6px solid transparent;border-bottom:6px solid transparent}

  /* Sections */
  main{padding-top:92px}
  .section{padding:22px 28px}
  .row-title{font-size:18px;margin:6px 0 12px;font-weight:700}

  /* Carousel */
  .carousel{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;scroll-snap-type:x mandatory}
  .carousel::-webkit-scrollbar{height:8px}
  .carousel-item{scroll-snap-align:start;flex:0 0 auto}

  /* Card */
  .card{
    min-width:170px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
    border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .18s ease,box-shadow .18s ease; position:relative;
  }
  .card:hover{transform:scale(1.06);box-shadow:0 22px 50px rgba(0,0,0,.7)}
  .thumb{height:240px;background-size:cover;background-position:center;display:block}
  .card h4{margin:10px 8px 8px;padding:0;font-size:14px}
  .card .actions{display:flex;gap:8px;padding:0 8px 12px}
  .card .actions button{flex:1;padding:8px;font-weight:700;border-radius:8px;border:none;cursor:pointer}
  .card .badge{position:absolute;left:10px;top:10px;background:rgba(0,0,0,.6);padding:6px 8px;border-radius:6px;font-weight:700;font-size:12px;border:1px solid rgba(255,255,255,.04)}

  /* play overlay on thumb */
  .thumb-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .thumb-overlay .circle{width:56px;height:56px;border-radius:50%;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;pointer-events:auto;border:2px solid rgba(255,255,255,.06)}
  .thumb-overlay .play{width:0;height:0;border-left:16px solid #fff;border-top:9px solid transparent;border-bottom:9px solid transparent;margin-left:6px}

  /* Movie player area */
  #watchArea{display:none;padding:22px 28px;border-top:1px solid rgba(255,255,255,.02);background:linear-gradient(180deg,rgba(0,0,0,.2),transparent)}
  #playerWrap{width:100%;max-width:1100px;border-radius:12px;background:#000;overflow:hidden;position:relative}
  #playerVideo{width:100%;height:560px;background:#000;display:block;border:0}
  .player-close{position:absolute;right:10px;top:10px;padding:8px;border-radius:8px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.06);cursor:pointer}

  /* Modals */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
  .modal{background:#0f0f0f;padding:20px;border-radius:12px;min-width:320px;max-width:520px}
  .modal h3{margin:0 0 8px}
  .modal p{color:var(--muted);font-size:14px}
  .modal input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:#0b0b0b;color:#fff}

  /* Payment UI */
  .payment-method{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .payment-method button{padding:10px;border-radius:8px;border:none;cursor:pointer}

  /* Loader + success */
  .loader{width:56px;height:56px;border-radius:50%;border:6px solid rgba(255,255,255,.06);border-top-color:var(--accent);animation:spin 1s linear infinite;margin:12px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .success-check{width:80px;height:80px;border-radius:50%;background:linear-gradient(180deg,#0f8a5f,#06b86a);display:flex;align-items:center;justify-content:center;margin:8px auto}
  .checkmark{width:36px;height:20px;border-left:4px solid #fff;border-bottom:4px solid #fff;transform:rotate(-45deg)}

  /* Receipt */
  .receipt{background:#07110b;padding:12px;border-radius:8px;color:rgba(255,255,255,.9);font-size:14px;margin-top:12px}

  /* Responsive */
  @media(max-width:900px){ .thumb{height:200px} #playerVideo{height:360px} .hero h1{font-size:32px} .card{min-width:140px} }
  @media(max-width:700px){ .hero{padding:110px 18px 28px} .thumb{height:160px} .card{min-width:120px} .hero h1{font-size:28px} #playerVideo{height:220px} }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">STREAMFLIX</div>
    <div style="color:rgba(255,255,255,.75)">Hindi • Trailers</div>
  </div>
  <div class="controls">
    <div id="greet" style="color:rgba(255,255,255,.92);font-weight:600"></div>
    <button id="subscribeBtn" class="btn">Subscribe</button>
    <button id="loginBtn" class="btn ghost">Login</button>
  </div>
</header>

<section class="hero" aria-hidden="false">
  <div class="meta">
    <h2>Unlimited Hindi Movies</h2>
    <h2>Series & more</h2>
    
  
  <p>Starts at just Rs.199. Cancel anytime</p>
    <div class="cta">
      <button id="playFeature" class="btn">Play KGF Trailer</button>
      <button id="moreInfo" class="btn ghost">More Info</button>
      <div style="margin-left:12px" class="play-mini" id="miniPlay">
        <div class="play-icon"></div>
        <div style="font-weight:700">Watch Quick Trailer</div>
      </div>
    </div>
  </div>
</section>

<main>
  <section class="section">
    <div class="row-title">Trending Now</div>
    <div class="carousel" id="carouselTrending" aria-live="polite"></div>
  </section>

  <section class="section">
    <div class="row-title">Top Picks</div>
    <div class="carousel" id="carouselTop"></div>
  </section>
</main>

<!-- Watch area -->
<div id="watchArea" aria-hidden="true">
  <h2 id="watchTitle" style="margin:0 0 12px"></h2>
  <div id="playerWrap">
   
    <iframe id="playerVideo" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    <button id="closePlayer" class="player-close" title="Close player">✕</button>
  </div>
</div>


<div id="backdrop" class="backdrop" role="dialog" aria-modal="true">
  <div class="modal" id="modalContent"></div>
</div>

<script>
  
  let currentUser = null; 
  const CATALOG = [
    {id:'kgf', title:'KGF Chapter 1', thumb:'https://i.ytimg.com/vi/-KfsY-qwBS0/maxresdefault.jpg', trailer:'youtube:-KfsY-qwBS0', movie:''},
    {id:'bahubali', title:'Baahubali: The Beginning', thumb:'https://upload.wikimedia.org/wikipedia/en/thumb/b/b6/Baahubali_%E2%80%93_The_Epic.jpg/250px-Baahubali_%E2%80%93_The_Epic.jpg', trailer:'youtube:3NQRhE772b0', movie:''},
    {id:'pushpa', title:'Pushpa: The Rise', thumb:'https://i.ytimg.com/vi/Q1NKMPhP8PY/maxresdefault.jpg', trailer:'youtube:Q1NKMPhP8PY', movie:''},
    {id:'animal', title:'Animal', thumb:'https://i.ytimg.com/vi/8FkLRUJj-o0/maxresdefault.jpg', trailer:'youtube:8FkLRUJj-o0', movie:''},
    {id:'shershaah', title:'Shershaah', thumb:'https://i.ytimg.com/vi/Q0FTXnefVBA/maxresdefault.jpg', trailer:'youtube:Q0FTXnefVBA', movie:''},
    {id:'war', title:'War', thumb:'https://i.ytimg.com/vi/tQ0mzXRk-oM/maxresdefault.jpg', trailer:'youtube:tQ0mzXRk-oM', movie:''}
  ];

  
  const $ = s => document.querySelector(s);
  const $$ = s => Array.from(document.querySelectorAll(s));
  function createCard(m){
    const el = document.createElement('div'); el.className='card carousel-item';
    el.setAttribute('data-id', m.id);
    el.innerHTML = `
      <div style="position:relative">
        <div class="thumb" style="background-image:url(${m.thumb})"></div>
        <div class="thumb-overlay">
          <div class="circle" data-trailer="${m.trailer}" title="Play Trailer">
            <div class="play"></div>
          </div>
        </div>
        <div class="badge">HD</div>
      </div>
      <h4>${m.title}</h4>
      <div class="actions">
        <button class="btn" data-trailer="${m.trailer}">Trailer</button>
        <button class="btn ghost" data-movie="${m.id}">Play</button>
      </div>`;
    return el;
  }

 
  function renderCatalog(){
    const t = $('#carouselTrending'); const p = $('#carouselTop');
    t.innerHTML = ''; p.innerHTML = '';
    CATALOG.forEach(m=>{
      t.appendChild(createCard(m));
      p.appendChild(createCard(m).cloneNode(true));
    });
  }

  // Modal helpers
  function openModal(html){
    $('#backdrop').style.display='flex';
    $('#modalContent').innerHTML = html;
   
    const firstInput = $('#modalContent').querySelector('input');
    if(firstInput) firstInput.focus();
  }
  function closeModal(){
    $('#backdrop').style.display='none';
    $('#modalContent').innerHTML = '';
  }

 
  function openAuth(){
    openModal(`<h3>Login / Signup</h3>
      <input id="authEmail" placeholder="Email" />
      <input id="authPass" placeholder="Password" type="password" />
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="doLogin" class="btn">Login</button>
        <button id="doSignup" class="btn ghost">Sign up</button>
      </div>
      <p style="color:var(--muted);margin-top:8px">(This demo uses mock auth. No real backend.)</p>`);

    $('#doLogin').onclick = ()=>{
      const e = $('#authEmail').value.trim(); const p = $('#authPass').value.trim();
      if(!e||!p){ alert('Enter email & password'); return }
      currentUser = {email:e, subscribed:false};
      $('#greet').textContent = `Hi ${e.split('@')[0]}`;
      closeModal();
      alert('Mock login successful');
    };
    $('#doSignup').onclick = ()=>{
      const e = $('#authEmail').value.trim(); const p = $('#authPass').value.trim();
      if(!e||!p){ alert('Enter email & password'); return }
      currentUser = {email:e, subscribed:false};
      $('#greet').textContent = `Hi ${e.split('@')[0]}`;
      closeModal();
      alert('Mock signup successful');
    };
  }

  
  function openDetail(m){
    openModal(`<h3>${m.title}</h3>
      <p style="color:var(--muted)">Trailer is free. Full movie requires subscription.</p>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button id="mTrailer" class="btn">Play Trailer</button>
        <button id="mPlay" class="btn ghost">Play Movie</button>
      </div>
      <p style="font-size:13px;color:var(--muted);margin-top:10px">Signed in: ${currentUser?currentUser.email:'No'}</p>`);

    $('#mTrailer').onclick = ()=>{ closeModal(); playMedia(m.trailer, `${m.title} — Trailer`); };
    $('#mPlay').onclick = ()=>{ 
      if(!currentUser){ alert('Login first'); openAuth(); return }
      if(!currentUser.subscribed){ if(confirm('Buy subscription for ₹199/month?')) openPaymentModal(m); return }
      closeModal();
      
      playMedia(m.trailer, m.title);
    };
  }

  
  function playMedia(src, title){
    $('#watchArea').style.display='block';
    $('#watchArea').setAttribute('aria-hidden','false');
    $('#watchTitle').textContent = title || '';
    const iframe = $('#playerVideo');
    // if youtube id
    if(typeof src === 'string' && src.startsWith('youtube:')){
      const id = src.split(':')[1];
      iframe.style.display='block';
      iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1`;
   
    } else {
      // treat as direct video url (mp4)
      iframe.style.display='block';
      iframe.src = src;
    }
    // scroll into view
    window.scrollTo({top:document.getElementById('watchArea').offsetTop-64,behavior:'smooth'});
  }

  // close player
  $('#closePlayer').onclick = ()=>{
    $('#playerVideo').src = '';
    $('#watchArea').style.display = 'none';
    $('#watchArea').setAttribute('aria-hidden','true');
  };

  
  function openPaymentModal(m){
    if(!currentUser){ openAuth(); return }
    openModal(`<h3>Subscribe — ₹199/month</h3>
      <p style="color:var(--muted)">Choose a payment method (dummy)</p>
      <div class="payment-method">
        <button id="payUpi" class="btn">Pay with UPI / Wallet</button>
        <button id="payCard" class="btn ghost">Pay with Card</button>
      </div>
      <div id="paymentStep" style="margin-top:12px"></div>`);
    $('#payUpi').onclick = ()=>startProcessing(m);
    $('#payCard').onclick = ()=>startProcessing(m);
  }

  function startProcessing(m){
    $('#paymentStep').innerHTML = `<div class="loader"></div><p style="text-align:center;color:var(--muted)">Processing payment...</p>`;
    setTimeout(()=>{
      $('#paymentStep').innerHTML = `<div class="success-check"><div class="checkmark"></div></div><p style="text-align:center;font-weight:700">Payment Successful</p><div class="receipt">Order: SUB-${Date.now()}<br/>Amount: ₹199<br/>User: ${currentUser.email}</div>`;
      currentUser.subscribed = true;
      $('#greet').textContent = `Hi ${currentUser.email.split('@')[0]}`;
      setTimeout(()=>{ closeModal(); alert('Subscription activated!'); if(m) playMedia(m.trailer, m.title); }, 1100);
    }, 1800);
  }

  
  $('#subscribeBtn').onclick = ()=>{ if(!currentUser){ openAuth(); return } if(currentUser.subscribed){ alert('Already subscribed'); return } openPaymentModal(); };
  $('#loginBtn').onclick = ()=>{ if(currentUser){ if(confirm('Logout?')){ currentUser = null; $('#greet').textContent=''; alert('Logged out'); } return } openAuth(); };

  // event delegation for dynamic cards
  document.addEventListener('click', (e)=>{
    if(e.target.closest('.card')){
      const c = e.target.closest('.card'); const id = c.getAttribute('data-id');
      const m = CATALOG.find(x=>x.id===id);
      if(m && e.target.matches('.card, .card *') && !e.target.closest('[data-trailer]') && !e.target.closest('[data-movie]')){
        openDetail(m);
      }
    }

    if(e.target.matches('[data-trailer]')) {
      const trailer = e.target.getAttribute('data-trailer');
      const title = e.target.closest('.card')?.querySelector('h4')?.textContent || 'Trailer';
      closeModal();
      playMedia(trailer, title + ' — Trailer');
    }

    if(e.target.matches('[data-movie]')){
      const id = e.target.getAttribute('data-movie');
      const m = CATALOG.find(x=>x.id===id);
      if(!m) return;
      if(!currentUser){ alert('Login first'); openAuth(); return }
      if(!currentUser.subscribed){ if(confirm('Buy subscription for ₹199/month?')) openPaymentModal(m); return }
      closeModal();
      playMedia(m.trailer, m.title);
    }
  });

 
  $('#backdrop').addEventListener('click', (ev)=>{ if(ev.target===$('#backdrop')) closeModal(); });

  // hero buttons
  $('#playFeature').onclick = ()=>{ const kgf = CATALOG.find(x=>x.id==='kgf'); playMedia(kgf.trailer, kgf.title + ' — Trailer'); };
  $('#miniPlay').onclick = ()=>{ $('#playFeature').click(); };

  // initial render
  renderCatalog();

  // expose catalog for debugging
  window.__CATALOG = CATALOG;
</script>
</body>
</html>
